<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ankush AI — Chat</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f9f9;
      --surface: #ffffff;
      --surface2: #f2f2f2;
      --surface3: #e8e8e8;
      --border: #e0e0e0;
      --border2: #cccccc;
      --text: #111111;
      --text2: #555555;
      --text3: #999999;
      --accent-boy: #222222;
      --accent-girl: #555555;
      --bubble-user: #1a1a1a;
      --bubble-ai: #f0f0f0;
      --radius: 14px;
      --radius-sm: 8px;
      --transition: 0.18s cubic-bezier(0.4,0,0.2,1);
    }

    html { font-size: 16px; }
    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── API BAR ── */
    #api-bar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 20px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    #api-bar label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      color: var(--text3);
      text-transform: uppercase;
      letter-spacing: .08em;
      white-space: nowrap;
    }
    #api-key-input {
      flex: 1;
      min-width: 200px;
      max-width: 380px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 12px;
      color: var(--text);
      outline: none;
      transition: border var(--transition), background var(--transition);
      letter-spacing: .04em;
    }
    #api-key-input:focus { border-color: var(--border2); background: var(--surface); }
    #api-key-input::placeholder { color: var(--text3); }

    #key-status {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      display: flex;
      align-items: center;
      gap: 5px;
    }
    #key-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--border2);
      transition: background .3s;
      flex-shrink: 0;
    }
    #key-dot.active { background: #3d9c6e; }
    #key-dot.error  { background: #c0392b; }

    #sound-toggle {
      margin-left: auto;
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text2);
      cursor: pointer;
      transition: all var(--transition);
      display: flex; align-items: center; gap: 5px;
    }
    #sound-toggle:hover { background: var(--surface2); }
    #sound-toggle.muted { color: var(--text3); }

    /* ── LAYOUT ── */
    #app {
      display: flex;
      flex: 1;
      max-width: 880px;
      width: 100%;
      margin: 0 auto;
      padding: 0 16px;
      flex-direction: column;
    }

    /* ── HEADER ── */
    #header {
      padding: 28px 0 0;
      display: flex;
      align-items: flex-end;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: space-between;
    }
    #brand {
      display: flex;
      flex-direction: column;
    }
    #brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      letter-spacing: -.02em;
      line-height: 1;
    }
    #brand-tag {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      letter-spacing: .08em;
      margin-top: 4px;
    }

    /* ── PERSONALITY SELECTOR ── */
    #persona-bar {
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .persona-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: var(--radius);
      border: 1.5px solid var(--border);
      background: var(--surface);
      cursor: pointer;
      transition: all var(--transition);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      user-select: none;
      position: relative;
      overflow: hidden;
    }
    .persona-btn::after {
      content: '';
      position: absolute;
      inset: 0;
      background: var(--text);
      opacity: 0;
      transition: opacity var(--transition);
    }
    .persona-btn:hover::after { opacity: .04; }
    .persona-btn.active {
      border-color: var(--text);
      background: var(--text);
      color: #fff;
    }
    .persona-btn .avatar {
      width: 26px; height: 26px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 700;
      background: var(--surface3);
      color: var(--text);
      flex-shrink: 0;
      transition: background var(--transition), color var(--transition);
    }
    .persona-btn.active .avatar { background: rgba(255,255,255,.2); color: #fff; }
    .persona-btn .badge {
      font-family: 'DM Mono', monospace;
      font-size: 9px;
      letter-spacing: .06em;
      color: var(--text3);
      transition: color var(--transition);
    }
    .persona-btn.active .badge { color: rgba(255,255,255,.6); }

    /* ── DIVIDER ── */
    #divider { height: 1px; background: var(--border); margin: 20px 0 0; }

    /* ── SYSTEM PROMPT PANEL ── */
    #prompt-toggle-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 0 0;
    }
    #prompt-toggle-btn {
      background: none;
      border: none;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      cursor: pointer;
      display: flex; align-items: center; gap: 5px;
      letter-spacing: .05em;
      text-transform: uppercase;
      padding: 4px 0;
      transition: color var(--transition);
    }
    #prompt-toggle-btn:hover { color: var(--text2); }
    #prompt-toggle-btn .chevron {
      font-size: 10px;
      transition: transform var(--transition);
      display: inline-block;
    }
    #prompt-toggle-btn.open .chevron { transform: rotate(90deg); }

    #prompt-panel {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.2s;
      opacity: 0;
    }
    #prompt-panel.open {
      max-height: 260px;
      opacity: 1;
    }
    #prompt-panel-inner {
      padding: 10px 0 14px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    #prompt-panel-inner label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      letter-spacing: .06em;
    }
    #system-prompt {
      width: 100%;
      min-height: 80px;
      max-height: 160px;
      resize: vertical;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      line-height: 1.6;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 10px 14px;
      color: var(--text);
      outline: none;
      transition: border var(--transition);
    }
    #system-prompt:focus { border-color: var(--border2); }
    #prompt-actions {
      display: flex; gap: 8px; align-items: center;
    }
    .prompt-action-btn {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      padding: 5px 12px;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      background: none;
      color: var(--text2);
      cursor: pointer;
      transition: all var(--transition);
    }
    .prompt-action-btn:hover { background: var(--surface2); }
    .prompt-action-btn.primary {
      background: var(--text);
      color: #fff;
      border-color: var(--text);
    }
    .prompt-action-btn.primary:hover { background: #333; }
    #prompt-saved-note {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: #3d9c6e;
      opacity: 0;
      transition: opacity .3s;
    }
    #prompt-saved-note.show { opacity: 1; }

    /* ── CHAT ── */
    #chat-area {
      flex: 1;
      overflow-y: auto;
      padding: 16px 0;
      display: flex;
      flex-direction: column;
      gap: 4px;
      scroll-behavior: smooth;
      min-height: 320px;
      max-height: calc(100vh - 380px);
    }
    #chat-area::-webkit-scrollbar { width: 4px; }
    #chat-area::-webkit-scrollbar-track { background: transparent; }
    #chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* empty state */
    #empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      flex: 1;
      padding: 48px 0;
      gap: 12px;
      animation: fadeUp .5s ease both;
    }
    #empty-icon {
      width: 56px; height: 56px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    #empty-title {
      font-family: 'Syne', sans-serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
    }
    #empty-sub {
      font-size: 13px;
      color: var(--text3);
      text-align: center;
      max-width: 300px;
      line-height: 1.6;
    }
    .quick-prompt {
      display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; margin-top: 4px;
    }
    .quick-chip {
      font-size: 12px;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text2);
      cursor: pointer;
      transition: all var(--transition);
      font-family: 'DM Sans', sans-serif;
    }
    .quick-chip:hover { background: var(--surface2); border-color: var(--border2); }

    /* messages */
    .msg-row {
      display: flex;
      align-items: flex-end;
      gap: 8px;
      animation: fadeUp .22s ease both;
      padding: 2px 0;
    }
    .msg-row.user { justify-content: flex-end; }
    .msg-row.ai   { justify-content: flex-start; }

    .msg-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      background: var(--surface2);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
      color: var(--text2);
    }

    .bubble {
      max-width: 72%;
      padding: 11px 15px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.65;
      position: relative;
      word-break: break-word;
    }
    .msg-row.user .bubble {
      background: var(--bubble-user);
      color: #fff;
      border-bottom-right-radius: 5px;
    }
    .msg-row.ai .bubble {
      background: var(--bubble-ai);
      color: var(--text);
      border-bottom-left-radius: 5px;
      border: 1px solid var(--border);
    }
    .bubble.typing {
      display: flex; align-items: center; gap: 4px;
      padding: 14px 18px;
    }
    .dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: var(--text3);
      animation: blink 1.2s infinite;
      flex-shrink: 0;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    .msg-time {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--text3);
      margin: 2px 6px 4px;
      text-align: right;
    }
    .msg-row.ai .msg-time { text-align: left; }

    /* ── INPUT AREA ── */
    #input-area {
      padding: 14px 0 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #persona-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      letter-spacing: .06em;
      display: flex; align-items: center; gap: 6px;
    }
    #persona-label span {
      color: var(--text2);
      font-weight: 500;
    }

    #input-row {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #chat-input {
      flex: 1;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      padding: 12px 16px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
      resize: none;
      min-height: 48px;
      max-height: 160px;
      overflow-y: auto;
      outline: none;
      transition: border var(--transition), box-shadow var(--transition);
      line-height: 1.5;
    }
    #chat-input:focus {
      border-color: var(--border2);
      box-shadow: 0 0 0 3px rgba(0,0,0,.05);
    }
    #chat-input::placeholder { color: var(--text3); }

    #send-btn {
      width: 48px; height: 48px;
      border-radius: var(--radius);
      background: var(--text);
      border: none;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all var(--transition);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }
    #send-btn:hover { background: #333; transform: scale(1.04); }
    #send-btn:active { transform: scale(.96); }
    #send-btn svg { fill: none; stroke: #fff; }
    #send-btn.loading { pointer-events: none; }
    #send-btn .spinner {
      position: absolute;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .7s linear infinite;
      display: none;
    }
    #send-btn.loading .spinner { display: block; }
    #send-btn.loading svg { display: none; }

    #clear-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 7px 12px;
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--text3);
      cursor: pointer;
      transition: all var(--transition);
      letter-spacing: .04em;
    }
    #clear-btn:hover { color: var(--text2); border-color: var(--border2); background: var(--surface2); }

    /* ── TOAST ── */
    #toast {
      position: fixed;
      bottom: 28px; left: 50%; transform: translateX(-50%) translateY(20px);
      background: var(--text);
      color: #fff;
      padding: 10px 20px;
      border-radius: var(--radius);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: .04em;
      opacity: 0;
      transition: all .3s cubic-bezier(.4,0,.2,1);
      pointer-events: none;
      z-index: 999;
      white-space: nowrap;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ── ANIMATIONS ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes blink {
      0%, 80%, 100% { opacity: .25; transform: scale(.9); }
      40%            { opacity: 1;   transform: scale(1.1); }
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.06); }
      100% { transform: scale(1); }
    }
    .pop { animation: pop .18s ease; }

    /* Responsive */
    @media(max-width:600px) {
      #brand-name { font-size: 20px; }
      .bubble { max-width: 88%; }
      #chat-area { max-height: calc(100vh - 440px); }
    }
  </style>
</head>
<body>

<!-- API KEY BAR -->
<div id="api-bar">
  <label for="api-key-input">⌘ OpenAI Key</label>
  <input
    id="api-key-input"
    type="password"
    placeholder="sk-••••••••••••••••••••••••••"
    autocomplete="off"
    spellcheck="false"
  />
  <div id="key-status">
    <div id="key-dot"></div>
    <span id="key-label" style="font-family:'DM Mono',monospace;font-size:11px;color:var(--text3)">No key</span>
  </div>
  <button id="sound-toggle" title="Toggle sound">
    <span id="sound-icon">🔔</span>
    <span id="sound-label">Sound on</span>
  </button>
</div>

<!-- MAIN APP -->
<div id="app">

  <!-- HEADER -->
  <div id="header">
    <div id="brand">
      <div id="brand-name">Ankush AI</div>
      <div id="brand-tag">// choose your companion</div>
    </div>
    <div id="persona-bar">
      <button class="persona-btn active" data-persona="ankush" onclick="selectPersona('ankush', this)">
        <div class="avatar">A</div>
        <div>
          <div>Ankush</div>
          <div class="badge">WITTY · BOY</div>
        </div>
      </button>
      <button class="persona-btn" data-persona="tanaya" onclick="selectPersona('tanaya', this)">
        <div class="avatar">T</div>
        <div>
          <div>Tanaya</div>
          <div class="badge">WARM · GIRL</div>
        </div>
      </button>
    </div>
  </div>

  <div id="divider"></div>

  <!-- SYSTEM PROMPT PANEL -->
  <div id="prompt-toggle-row">
    <button id="prompt-toggle-btn" onclick="togglePrompt()">
      <span class="chevron">▶</span>
      Custom System Prompt
    </button>
    <span id="prompt-saved-note">✓ Saved</span>
  </div>
  <div id="prompt-panel">
    <div id="prompt-panel-inner">
      <label>SYSTEM PROMPT — customise how the AI behaves</label>
      <textarea id="system-prompt" placeholder="Enter a custom system prompt… e.g. 'You are a helpful tutor who speaks in simple language.'" rows="4"></textarea>
      <div id="prompt-actions">
        <button class="prompt-action-btn" onclick="resetPrompt()">Reset</button>
        <button class="prompt-action-btn primary" onclick="savePrompt()">Save Prompt</button>
        <span id="prompt-saved-note">✓ Saved</span>
      </div>
    </div>
  </div>

  <!-- CHAT -->
  <div id="chat-area">
    <div id="empty-state">
      <div id="empty-icon" id="empty-icon-el">💬</div>
      <div id="empty-title">Start a conversation</div>
      <div id="empty-sub">Choose Ankush or Tanaya above, then say anything.</div>
      <div class="quick-prompt">
        <span class="quick-chip" onclick="quickSend('Hey! Who are you?')">👋 Hey! Who are you?</span>
        <span class="quick-chip" onclick="quickSend('Tell me a joke')">😄 Tell me a joke</span>
        <span class="quick-chip" onclick="quickSend('What can you help me with?')">🤔 What can you help me with?</span>
      </div>
    </div>
  </div>

  <!-- INPUT AREA -->
  <div id="input-area">
    <div id="persona-label">Talking to: <span id="active-persona-name">Ankush</span></div>
    <div id="input-row">
      <textarea
        id="chat-input"
        placeholder="Type a message…"
        rows="1"
        onkeydown="handleKey(event)"
        oninput="autoResize(this)"
      ></textarea>
      <button id="send-btn" onclick="sendMessage()" title="Send">
        <svg width="18" height="18" viewBox="0 0 24 24" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/>
          <polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        <div class="spinner"></div>
      </button>
    </div>
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <div style="font-family:'DM Mono',monospace;font-size:10px;color:var(--text3)">Enter to send · Shift+Enter for newline</div>
      <button id="clear-btn" onclick="clearChat()">Clear chat</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  /* ═══════════════════════════════════════════
     STATE
  ═══════════════════════════════════════════ */
  let currentPersona = 'ankush';
  let messages = []; // [{role:'user'|'assistant', content:'...'}]
  let isSending = false;
  let soundEnabled = true;
  let customPrompt = '';

  const PERSONAS = {
    ankush: {
      name: 'Ankush',
      emoji: 'A',
      defaultPrompt: `You are Ankush, a sharp, witty, and confident guy. You're smart and helpful but also have a fun, slightly sarcastic edge. You use casual language, crack jokes when appropriate, and keep things real. You're like that clever friend who always has an answer but doesn't take himself too seriously. You avoid being overly formal or robotic. Be engaging, clever, and a bit cheeky. Keep responses concise unless depth is needed.`,
    },
    tanaya: {
      name: 'Tanaya',
      emoji: 'T',
      defaultPrompt: `You are Tanaya, a warm, empathetic, and thoughtful girl. You're kind, encouraging, and emotionally intelligent. You listen carefully and respond with genuine care. You have a cheerful personality with a touch of elegance — you're supportive and uplifting without being fake. You speak naturally and warmly, sometimes adding light humor to brighten the mood. Be nurturing, insightful, and real. Keep responses human and heartfelt.`,
    },
  };

  /* ═══════════════════════════════════════════
     AUDIO
  ═══════════════════════════════════════════ */
  const AudioCtx = window.AudioContext || window.webkitAudioContext;
  let audioCtx = null;

  function getAudioCtx() {
    if (!audioCtx) audioCtx = new AudioCtx();
    return audioCtx;
  }

  function playTone(freq, type = 'sine', dur = 0.12, vol = 0.08) {
    if (!soundEnabled) return;
    try {
      const ctx = getAudioCtx();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = type; osc.frequency.value = freq;
      gain.gain.setValueAtTime(vol, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + dur);
      osc.start(); osc.stop(ctx.currentTime + dur);
    } catch(e) {}
  }

  function playSend()    { playTone(880, 'sine', 0.09, 0.07); setTimeout(()=>playTone(1100,'sine',.08,.05),70); }
  function playReceive() { playTone(660, 'sine', 0.10, 0.06); setTimeout(()=>playTone(880,'sine',.09,.04),80); }
  function playError()   { playTone(220, 'square', 0.2, 0.08); }

  /* ═══════════════════════════════════════════
     API KEY
  ═══════════════════════════════════════════ */
  const apiInput = document.getElementById('api-key-input');
  const keyDot   = document.getElementById('key-dot');
  const keyLabel = document.getElementById('key-label');

  // Load saved key
  try {
    const saved = localStorage.getItem('oai_key');
    if (saved) { apiInput.value = saved; setKeyActive(); }
  } catch(e) {}

  apiInput.addEventListener('input', () => {
    const v = apiInput.value.trim();
    if (v.startsWith('sk-') && v.length > 20) {
      setKeyActive();
      try { localStorage.setItem('oai_key', v); } catch(e) {}
    } else {
      keyDot.className = '';
      keyLabel.textContent = v ? 'Invalid key' : 'No key';
    }
  });

  function setKeyActive() {
    keyDot.className = 'active';
    keyLabel.textContent = 'Key saved';
  }

  /* ═══════════════════════════════════════════
     SOUND TOGGLE
  ═══════════════════════════════════════════ */
  document.getElementById('sound-toggle').addEventListener('click', function() {
    soundEnabled = !soundEnabled;
    document.getElementById('sound-icon').textContent = soundEnabled ? '🔔' : '🔕';
    document.getElementById('sound-label').textContent = soundEnabled ? 'Sound on' : 'Sound off';
    this.classList.toggle('muted', !soundEnabled);
  });

  /* ═══════════════════════════════════════════
     PERSONA
  ═══════════════════════════════════════════ */
  function selectPersona(p, btn) {
    if (currentPersona === p) return;
    currentPersona = p;
    document.querySelectorAll('.persona-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    document.getElementById('active-persona-name').textContent = PERSONAS[p].name;
    // Update empty state icon
    const ei = document.getElementById('empty-icon');
    if (ei) ei.textContent = p === 'ankush' ? '🧑‍💻' : '👩‍🎤';
    // Pop animation
    btn.classList.add('pop');
    setTimeout(() => btn.classList.remove('pop'), 200);
    showToast(`Switched to ${PERSONAS[p].name}`);
    // Reset system prompt textarea to default if not customised
    if (!customPrompt) {
      document.getElementById('system-prompt').value = '';
    }
  }

  /* ═══════════════════════════════════════════
     SYSTEM PROMPT
  ═══════════════════════════════════════════ */
  function togglePrompt() {
    const panel = document.getElementById('prompt-panel');
    const btn   = document.getElementById('prompt-toggle-btn');
    const isOpen = panel.classList.toggle('open');
    btn.classList.toggle('open', isOpen);
  }

  function savePrompt() {
    customPrompt = document.getElementById('system-prompt').value.trim();
    const note = document.getElementById('prompt-saved-note');
    note.classList.add('show');
    setTimeout(() => note.classList.remove('show'), 2000);
    showToast('System prompt saved');
  }

  function resetPrompt() {
    customPrompt = '';
    document.getElementById('system-prompt').value = '';
    showToast('Prompt reset to default');
  }

  function getSystemPrompt() {
    return customPrompt || PERSONAS[currentPersona].defaultPrompt;
  }

  /* ═══════════════════════════════════════════
     CHAT RENDER
  ═══════════════════════════════════════════ */
  function renderMessages() {
    const area = document.getElementById('chat-area');
    if (messages.length === 0) {
      area.innerHTML = `
        <div id="empty-state">
          <div id="empty-icon">${currentPersona === 'ankush' ? '🧑‍💻' : '👩‍🎤'}</div>
          <div id="empty-title">Start a conversation</div>
          <div id="empty-sub">Say anything to ${PERSONAS[currentPersona].name}.</div>
          <div class="quick-prompt">
            <span class="quick-chip" onclick="quickSend('Hey! Who are you?')">👋 Hey! Who are you?</span>
            <span class="quick-chip" onclick="quickSend('Tell me a joke')">😄 Tell me a joke</span>
            <span class="quick-chip" onclick="quickSend('What can you help me with?')">🤔 What can you help?</span>
          </div>
        </div>`;
      return;
    }
    area.innerHTML = messages.map((m, i) => {
      const isUser = m.role === 'user';
      const persona = PERSONAS[currentPersona];
      const time = new Date().toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      if (isUser) {
        return `<div class="msg-row user" style="animation-delay:${i*.02}s">
          <div class="bubble">${escHtml(m.content)}</div>
        </div>`;
      } else {
        return `<div class="msg-row ai" style="animation-delay:${i*.02}s">
          <div class="msg-avatar">${persona.emoji}</div>
          <div class="bubble">${formatMsg(m.content)}</div>
        </div>`;
      }
    }).join('');
    scrollBottom();
  }

  function addTypingIndicator() {
    const area = document.getElementById('chat-area');
    const row = document.createElement('div');
    row.className = 'msg-row ai';
    row.id = 'typing-row';
    const persona = PERSONAS[currentPersona];
    row.innerHTML = `<div class="msg-avatar">${persona.emoji}</div>
      <div class="bubble typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
    area.appendChild(row);
    scrollBottom();
  }

  function removeTypingIndicator() {
    const row = document.getElementById('typing-row');
    if (row) row.remove();
  }

  function scrollBottom() {
    const area = document.getElementById('chat-area');
    area.scrollTop = area.scrollHeight;
  }

  function escHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
  }

  function formatMsg(str) {
    // Bold: **text**
    str = str.replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>');
    // Italic: *text*
    str = str.replace(/\*(.*?)\*/g,'<em>$1</em>');
    // Code inline
    str = str.replace(/`([^`]+)`/g,'<code style="background:var(--surface3);border-radius:4px;padding:1px 5px;font-family:DM Mono,monospace;font-size:12px">$1</code>');
    // Newlines
    str = str.replace(/\n/g,'<br>');
    return str;
  }

  /* ═══════════════════════════════════════════
     SEND MESSAGE
  ═══════════════════════════════════════════ */
  async function sendMessage(text) {
    const input = document.getElementById('chat-input');
    const msg = (text || input.value).trim();
    if (!msg || isSending) return;

    const key = apiInput.value.trim();
    if (!key || !key.startsWith('sk-')) {
      showToast('⚠ Please enter a valid OpenAI API key');
      playError();
      apiInput.focus();
      keyDot.className = 'error';
      setTimeout(() => { keyDot.className = ''; }, 2000);
      return;
    }

    input.value = '';
    autoResize(input);
    messages.push({ role: 'user', content: msg });
    renderMessages();
    playSend();

    isSending = true;
    const btn = document.getElementById('send-btn');
    btn.classList.add('loading');

    addTypingIndicator();

    try {
      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${key}`,
        },
        body: JSON.stringify({
          model: 'gpt-4o-mini',
          messages: [
            { role: 'system', content: getSystemPrompt() },
            ...messages,
          ],
          temperature: 0.85,
          max_tokens: 800,
        }),
      });

      if (!response.ok) {
        const err = await response.json().catch(() => ({}));
        const msg = err?.error?.message || `HTTP ${response.status}`;
        throw new Error(msg);
      }

      const data = await response.json();
      const reply = data.choices?.[0]?.message?.content || '…';
      removeTypingIndicator();
      messages.push({ role: 'assistant', content: reply });
      renderMessages();
      playReceive();

      // Mark key as valid
      keyDot.className = 'active';
      keyLabel.textContent = 'Key active';

    } catch (err) {
      removeTypingIndicator();
      // Show error as a chat bubble
      messages.push({ role: 'assistant', content: `⚠ ${err.message}` });
      renderMessages();
      playError();
      showToast('Error: ' + err.message.slice(0, 60));
      keyDot.className = 'error';
      setTimeout(() => { keyDot.className = 'active'; }, 3000);
    } finally {
      isSending = false;
      btn.classList.remove('loading');
    }
  }

  function quickSend(text) {
    document.getElementById('chat-input').value = text;
    sendMessage(text);
  }

  function clearChat() {
    messages = [];
    renderMessages();
    showToast('Chat cleared');
  }

  /* ═══════════════════════════════════════════
     INPUT HELPERS
  ═══════════════════════════════════════════ */
  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  }

  function autoResize(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 160) + 'px';
  }

  /* ═══════════════════════════════════════════
     TOAST
  ═══════════════════════════════════════════ */
  let toastTimer = null;
  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
  }

  /* ═══════════════════════════════════════════
     INIT
  ═══════════════════════════════════════════ */
  renderMessages();
</script>
</body>
</html>
